<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Added user-scalable=no and viewport-fit=cover for better iOS app experience -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iOS App Config Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shot Timer">

    <title>Web Shot Timer</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #111;
            color: white;
            padding-top: 50px;
        }

        #display {
            font-size: 4rem;
            margin: 20px;
            font-family: monospace;
        }

        .btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 10px;
            border: none;
        }

        #startBtn {
            background: #28a745;
            color: white;
        }

        #stopBtn {
            background: #dc3545;
            color: white;
            display: none;
        }

        #splits {
            margin-top: 20px;
            text-align: left;
            display: inline-block;
            width: 80%;
        }

        .shot-entry {
            border-bottom: 1px solid #444;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <h1>Shot Timer</h1>
    <div id="display">0.00</div>
    <button id="startBtn" class="btn">START (Wait for Beep)</button>
    <button id="stopBtn" class="btn">STOP</button>
    <div id="splits"></div>

    <!-- NoSleep.js is a common hack to keep iOS screens on -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <script src="shot_timer.js"></script>
</body>

</html>
