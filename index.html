<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Shot Timer">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="apple-touch-icon.png">
    <title>Shot Timer Pro</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            text-align: center;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background 0.1s;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin-top: 10px;
            font-size: 1.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #display {
            font-family: 'Orbitron', monospace;
            font-size: 5rem;
            margin: 20px 0;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        /* Controls Panel */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            text-align: left;
        }

        .setting-column {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            text-align: left;
        }

        .setting-row:last-child, .setting-column:last-child {
            margin-bottom: 0;
        }

        .setting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .setting-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        
        .setting-value {
            font-family: 'Orbitron', monospace;
            color: var(--primary);
            font-weight: 700;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        select, input[type="number"] {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }

        input[type="number"] {
            width: 60px;
            text-align: center;
        }

        /* Custom Range Slider Styling */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 8px;
            border-radius: 4px;
            outline: none;
            border: none;
            padding: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .btn {
            width: 100%;
            max-width: 400px;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s, background 0.2s;
            margin-bottom: 10px;
            font-family: 'Inter', sans-serif;
        }
        
        .btn:active {
            transform: scale(0.98);
        }

        .btn-large-green {
            background: var(--primary) !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4) !important;
            padding: 50px 20px !important;
            font-size: 2.5rem !important;
            margin-bottom: 10px !important;
        }

        .btn-small-blue {
            background: #3b82f6 !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4) !important;
            padding: 18px !important;
            font-size: 1.3rem !important;
            margin-bottom: 10px !important;
        }

        #stopBtn {
            background: var(--danger);
            color: white;
            display: none;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            padding: 50px 20px;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* History & Splits */
        .history-container {
            width: 100%;
            max-width: 400px;
            text-align: left;
            margin-top: 10px;
        }
        
        .string-block {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }
        
        .string-header {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
        }

        .shot-entry {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 8px 0;
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
        }
        
        .shot-entry:last-child {
            border-bottom: none;
        }
        
        .split-time {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .delete-btn {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            margin-left: 15px;
        }
        .delete-btn:active {
            background: var(--danger);
            color: white;
        }

    </style>
</head>
<body>

    <h1>Shot Timer Pro</h1>
    
    <div id="display">0.00</div>
    
    <div class="panel" id="settingsPanel">
        <div class="setting-row">
            <span class="setting-label">Start Delay</span>
            <select id="delayType">
                <option value="instant">Instant</option>
                <option value="fixed">Fixed (3s)</option>
                <option value="random" selected>Random (2-5s)</option>
            </select>
        </div>
        <div class="setting-row">
            <span class="setting-label">Par Time (sec)</span>
            <div>
                <input type="number" id="parTime" value="0.00" step="0.1" min="0">
            </div>
        </div>
        <!-- Auto location will be fetched in JS -->
        <div class="setting-row">
            <span class="setting-label">Auto-Stop (Shots)</span>
            <div>
                <input type="number" id="targetShots" value="2" min="0" placeholder="0 = infinite">
            </div>
        </div>
        <div class="setting-column">
            <div class="setting-header">
                <span class="setting-label">Sensitivity</span>
                <span class="setting-value" id="sensValueDisplay">25</span>
            </div>
            <input type="range" id="sensitivity" min="0" max="100" value="25">
            <div class="slider-labels">
                <span>Live 9mm (20-30)</span>
                <span>Dry Fire (85-95)</span>
            </div>
        </div>
    </div>

    <button id="newStringBtn" class="btn btn-large-green" style="display: none;">START</button>
    <button id="startBtn" class="btn btn-large-green">START</button>
    <button id="stopBtn" class="btn">STOP</button>

    <div class="data-actions" style="display: flex; gap: 10px; width: 100%; max-width: 400px; margin-top: 10px;">
        <button id="exportBtn" class="btn" style="font-size: 1rem; padding: 12px; background: rgba(255,255,255,0.1); flex: 1;">EXPORT</button>
        <button id="importBtn" class="btn" style="font-size: 1rem; padding: 12px; background: rgba(255,255,255,0.1); flex: 1;">IMPORT</button>
        <input type="file" id="importFile" style="display: none;" accept=".json">
    </div>
    
    <div class="data-actions" style="display: flex; width: 100%; max-width: 400px; margin-top: 10px; margin-bottom: 20px;">
        <button id="deleteAllBtn" class="btn" style="font-size: 1rem; padding: 12px; background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); flex: 1; transition: background 0.2s;">DELETE ALL HISTORY</button>
    </div>

    <div class="history-container" id="historyContainer">
        <!-- Current String will populate here -->
        <div id="currentString" class="string-block" style="display:none;">
            <div class="string-header">Current Run</div>
            <div id="splits"></div>
        </div>
        <!-- Past strings will prepend here -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <script src="shot_timer.js"></script>
</body>
</html>
