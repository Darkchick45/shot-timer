<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Shot Timer">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="apple-touch-icon.png">
    <title>Shot Timer Pro</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; /* OLED-friendly black */
            --panel: #18181b; /* Sleek dark gray */
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.5);
            --danger: #ef4444;
            --accent: #3b82f6;
            --neon-blue: #38bdf8; /* Light cyan blue */
            --neon-blue-glow: rgba(56, 189, 248, 0.5);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -10%, rgba(16, 185, 129, 0.15) 0%, transparent 60%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            box-sizing: border-box;
            overscroll-behavior: none;
        }

        h1 {
            display: none; /* Replaced by .header */
        }

        .header {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--neon-blue);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--neon-blue-glow);
        }

        #display {
            font-size: 7.5rem;
            font-weight: 800;
            color: #ffffff;
            font-variant-numeric: tabular-nums;
            text-align: center;
            margin: 0 0 30px 0;
            letter-spacing: -4px;
            line-height: 1;
            text-shadow: 0 0 40px var(--primary-glow);
        }

        /* Controls Panel */
        .settings-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            text-align: left;
        }

        .setting-column {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            text-align: left;
        }

        .setting-row:last-child, .setting-column:last-child {
            margin-bottom: 0;
        }

        .setting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .setting-label {
            color: var(--neon-blue);
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--neon-blue-glow);
        }
        
        .setting-value {
            font-family: 'Inter', monospace;
            color: var(--neon-blue);
            font-weight: 800;
            font-size: 1.1rem;
            text-shadow: 0 0 15px var(--neon-blue-glow);
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

         input[type="text"], input[type="number"], select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: var(--neon-blue);
            font-weight: 800;
            text-shadow: 0 0 10px var(--neon-blue-glow);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 1rem;
            width: 100px;
            text-align: right;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s;
        }
        
        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue-glow);
        }

        input[type="number"] {
            width: 100px; /* Explicitly set width for number input */
        }

        /* Custom Range Slider Styling */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 8px;
            border-radius: 4px;
            outline: none;
            border: none;
            padding: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .btn {
            width: 100%;
            max-width: 400px;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
        }
        
        .btn:active {
            transform: scale(0.96);
        }

        .btn-start-massive {
            background: linear-gradient(135deg, #3b82f6, #a855f7) !important; /* Blue to Purple blend */
            color: white !important;
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4) !important;
            padding: 40px 20px !important;
            font-size: 2.2rem !important;
            margin-top: 40px !important;
            margin-bottom: 15px !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
        }

        .btn-small-blue {
            background: rgba(59, 130, 246, 0.1) !important;
            color: var(--accent) !important;
            border: 1px solid rgba(59, 130, 246, 0.3) !important;
            box-shadow: none !important;
            padding: 20px !important;
            font-size: 1.2rem !important;
            margin-bottom: 15px !important;
        }

        #stopBtn {
            background: var(--danger);
            color: white;
            display: none;
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
            padding: 40px 20px;
            font-size: 2.2rem;
            margin-top: 40px;
            margin-bottom: 15px;
        }

        /* History & Splits */
        .history-container {
            width: 100%;
            max-width: 400px;
            text-align: left;
            margin-top: 10px;
        }
        
        .string-block {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        
        .string-header {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .shot-entry {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 8px 0;
            display: flex;
            justify-content: space-between;
            font-family: 'Inter', monospace; /* Changed from Orbitron */
            font-size: 0.9rem;
        }
        
        .shot-entry:last-child {
            border-bottom: none;
        }
        
        .split-time {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            margin-left: 15px;
            transition: all 0.2s;
        }
        .delete-btn:active {
            background: var(--danger);
            color: white;
        }

    </style>
</head>
<body>

    <h1>Shot Timer Pro</h1>
    
    <div id="display">0.00</div>
    
    <div class="panel" id="settingsPanel">
        <div class="setting-row">
            <span class="setting-label">Start Delay</span>
            <select id="delayType">
                <option value="instant">Instant</option>
                <option value="fixed">Fixed (3s)</option>
                <option value="random" selected>Random (2-5s)</option>
            </select>
        </div>
        <div class="setting-row">
            <span class="setting-label">Par Time (sec)</span>
            <div>
                <input type="number" id="parTime" value="0.00" step="0.1" min="0">
            </div>
        </div>
        <!-- Auto location will be fetched in JS -->
        <div class="setting-row">
            <span class="setting-label">Auto-Stop (Shots)</span>
            <div>
                <input type="number" id="targetShots" value="2" min="0" placeholder="0 = infinite">
            </div>
        </div>
        <div class="setting-column">
            <div class="setting-header">
                <span class="setting-label">Sensitivity</span>
                <span class="setting-value" id="sensValueDisplay">25</span>
            </div>
            <input type="range" id="sensitivity" min="0" max="100" value="25">
            <div class="slider-labels">
                <span>Live 9mm (20-30)</span>
                <span>Dry Fire (85-95)</span>
            </div>
        </div>
    </div>

    <button id="newStringBtn" class="btn btn-start-massive" style="display: none;">START</button>
    <button id="startBtn" class="btn btn-start-massive">START</button>
    <button id="stopBtn" class="btn">STOP</button>

    <div class="data-actions" style="display: flex; gap: 10px; width: 100%; max-width: 400px; margin-top: 10px;">
        <button id="exportBtn" class="btn" style="font-size: 1rem; padding: 12px; background: rgba(255,255,255,0.1); flex: 1;">EXPORT</button>
        <button id="importBtn" class="btn" style="font-size: 1rem; padding: 12px; background: rgba(255,255,255,0.1); flex: 1;">IMPORT</button>
        <input type="file" id="importFile" style="display: none;" accept=".json">
    </div>
    
    <div class="data-actions" style="display: flex; width: 100%; max-width: 400px; margin-top: 10px; margin-bottom: 20px;">
        <button id="deleteAllBtn" class="btn" style="font-size: 1rem; padding: 12px; background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); flex: 1; transition: background 0.2s;">DELETE ALL HISTORY</button>
    </div>

    <div class="history-container" id="historyContainer">
        <!-- Current String will populate here -->
        <div id="currentString" class="string-block" style="display:none;">
            <div class="string-header">Current Run</div>
            <div id="splits"></div>
        </div>
        <!-- Past strings will prepend here -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <script src="shot_timer.js"></script>
</body>
</html>
